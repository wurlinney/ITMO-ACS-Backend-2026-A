openapi: 3.0.3
info:
  title: RecipeHub API
  description: Сервис для обмена рецептами и кулинарных блогов
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: Auth
    description: Аутентификация и регистрация
  - name: Users
    description: Управление профилями пользователей
  - name: Recipes
    description: CRUD рецептов
  - name: Posts
    description: CRUD постов (блог)
  - name: Comments
    description: Комментарии к рецептам и постам
  - name: Likes
    description: Лайки рецептов и постов
  - name: Follows
    description: Подписки на пользователей
  - name: Saved Recipes
    description: Сохранённые рецепты
  - name: References
    description: Справочники (типы блюд, сложность, теги, ингредиенты)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ---- Error ----
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: "Сущность не найдена"
            details:
              type: array
              items:
                type: string

    # ---- Pagination ----
    Pagination:
      type: object
      properties:
        total:
          type: integer
          format: int64
          example: 100
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0

    # ---- Auth ----
    RegisterRequest:
      type: object
      required: [email, username, password, display_name]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        username:
          type: string
          minLength: 3
          maxLength: 100
          example: chef_alina
        password:
          type: string
          minLength: 8
          example: "strongPassword123"
        display_name:
          type: string
          maxLength: 100
          example: Алина

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: "strongPassword123"

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: Время жизни access_token в секундах
          example: 3600

    # ---- User ----
    UserShort:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: chef_alina
        display_name:
          type: string
          example: Алина
        avatar_url:
          type: string
          nullable: true
          example: "https://cdn.example.com/avatars/1.jpg"

    UserProfile:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        username:
          type: string
          example: chef_alina
        display_name:
          type: string
          example: Алина
        bio:
          type: string
          nullable: true
          example: "Люблю готовить итальянскую кухню"
        avatar_url:
          type: string
          nullable: true
        followers_count:
          type: integer
          example: 42
        following_count:
          type: integer
          example: 15
        recipes_count:
          type: integer
          example: 8
        created_at:
          type: string
          format: date-time

    UpdateUserRequest:
      type: object
      properties:
        display_name:
          type: string
          maxLength: 100
        bio:
          type: string
        avatar_url:
          type: string

    # ---- Recipe ----
    RecipeStepRequest:
      type: object
      required: [step_number, description]
      properties:
        step_number:
          type: integer
          minimum: 1
          example: 1
        description:
          type: string
          example: "Нарезать лук мелкими кубиками"
        image_url:
          type: string
          nullable: true

    RecipeIngredientRequest:
      type: object
      required: [ingredient_id]
      properties:
        ingredient_id:
          type: integer
          format: int64
          example: 5
        quantity:
          type: number
          format: double
          nullable: true
          example: 200
        unit_id:
          type: integer
          format: int64
          nullable: true
          example: 2
        note:
          type: string
          nullable: true
          example: "мелко нарезанный"

    CreateRecipeRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 255
          example: "Паста Карбонара"
        description:
          type: string
          nullable: true
          example: "Классический итальянский рецепт"
        cover_image_url:
          type: string
          nullable: true
        video_url:
          type: string
          nullable: true
        dish_type_id:
          type: integer
          format: int64
          nullable: true
          example: 1
        difficulty_id:
          type: integer
          format: int64
          nullable: true
          example: 2
        prep_time_minutes:
          type: integer
          minimum: 0
          nullable: true
          example: 15
        cook_time_minutes:
          type: integer
          minimum: 0
          nullable: true
          example: 20
        servings:
          type: integer
          minimum: 1
          nullable: true
          example: 4
        steps:
          type: array
          items:
            $ref: '#/components/schemas/RecipeStepRequest'
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/RecipeIngredientRequest'
        tag_ids:
          type: array
          items:
            type: integer
            format: int64
          example: [1, 3]

    UpdateRecipeRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        cover_image_url:
          type: string
          nullable: true
        video_url:
          type: string
          nullable: true
        dish_type_id:
          type: integer
          format: int64
          nullable: true
        difficulty_id:
          type: integer
          format: int64
          nullable: true
        prep_time_minutes:
          type: integer
          minimum: 0
          nullable: true
        cook_time_minutes:
          type: integer
          minimum: 0
          nullable: true
        servings:
          type: integer
          minimum: 1
          nullable: true
        steps:
          type: array
          items:
            $ref: '#/components/schemas/RecipeStepRequest'
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/RecipeIngredientRequest'
        tag_ids:
          type: array
          items:
            type: integer
            format: int64

    RecipeStep:
      type: object
      properties:
        id:
          type: integer
          format: int64
        step_number:
          type: integer
          example: 1
        description:
          type: string
        image_url:
          type: string
          nullable: true

    RecipeIngredient:
      type: object
      properties:
        id:
          type: integer
          format: int64
        ingredient:
          $ref: '#/components/schemas/IngredientRef'
        quantity:
          type: number
          format: double
          nullable: true
          example: 200
        unit:
          $ref: '#/components/schemas/MeasurementUnit'
        note:
          type: string
          nullable: true

    RecipeListItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: "Паста Карбонара"
        description:
          type: string
          nullable: true
        cover_image_url:
          type: string
          nullable: true
        author:
          $ref: '#/components/schemas/UserShort'
        dish_type:
          $ref: '#/components/schemas/DishType'
        difficulty:
          $ref: '#/components/schemas/Difficulty'
        prep_time_minutes:
          type: integer
          nullable: true
        cook_time_minutes:
          type: integer
          nullable: true
        servings:
          type: integer
          nullable: true
        likes_count:
          type: integer
          example: 12
        comments_count:
          type: integer
          example: 3
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        created_at:
          type: string
          format: date-time

    RecipeFull:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
          nullable: true
        cover_image_url:
          type: string
          nullable: true
        video_url:
          type: string
          nullable: true
        author:
          $ref: '#/components/schemas/UserShort'
        dish_type:
          $ref: '#/components/schemas/DishType'
        difficulty:
          $ref: '#/components/schemas/Difficulty'
        prep_time_minutes:
          type: integer
          nullable: true
        cook_time_minutes:
          type: integer
          nullable: true
        servings:
          type: integer
          nullable: true
        likes_count:
          type: integer
        comments_count:
          type: integer
        is_liked:
          type: boolean
          description: Лайкнул ли текущий пользователь (false если не авторизован)
        is_saved:
          type: boolean
          description: Сохранён ли рецепт текущим пользователем
        steps:
          type: array
          items:
            $ref: '#/components/schemas/RecipeStep'
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/RecipeIngredient'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ---- Post ----
    CreatePostRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          maxLength: 255
          example: "Мой кулинарный путь"
        content:
          type: string
          example: "Всё началось с простой яичницы..."
        cover_image_url:
          type: string
          nullable: true

    UpdatePostRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        content:
          type: string
        cover_image_url:
          type: string
          nullable: true

    PostListItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        content:
          type: string
          description: Полный текст или превью
        cover_image_url:
          type: string
          nullable: true
        author:
          $ref: '#/components/schemas/UserShort'
        likes_count:
          type: integer
        comments_count:
          type: integer
        created_at:
          type: string
          format: date-time

    PostFull:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        content:
          type: string
        cover_image_url:
          type: string
          nullable: true
        author:
          $ref: '#/components/schemas/UserShort'
        likes_count:
          type: integer
        comments_count:
          type: integer
        is_liked:
          type: boolean
          description: Лайкнул ли текущий пользователь
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ---- Comment ----
    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          example: "Отличный рецепт, спасибо!"
        parent_comment_id:
          type: integer
          format: int64
          nullable: true
          description: ID родительского комментария для ответа

    Comment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        author:
          $ref: '#/components/schemas/UserShort'
        content:
          type: string
        parent_comment_id:
          type: integer
          format: int64
          nullable: true
        replies:
          type: array
          description: Вложенные ответы (только для корневых комментариев)
          items:
            $ref: '#/components/schemas/Comment'
        created_at:
          type: string
          format: date-time

    # ---- References ----
    DishType:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "Суп"

    Difficulty:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "Средняя"

    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "вегетарианское"

    IngredientRef:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "Томаты"

    MeasurementUnit:
      type: object
      nullable: true
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "грамм"
        short_name:
          type: string
          example: "г"

    # ---- Follow ----
    FollowUser:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserShort'
        created_at:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Невалидный JSON или параметры
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: BAD_REQUEST
              message: "Невалидный формат JSON"

    Unauthorized:
      description: Нет или невалидный токен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: "Требуется авторизация"

    Forbidden:
      description: Действие запрещено (не автор)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: FORBIDDEN
              message: "Нет прав на выполнение действия"

    NotFound:
      description: Сущность не найдена
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: "Сущность не найдена"

    Conflict:
      description: Дубликат (email, username, повторный лайк)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: CONFLICT
              message: "Пользователь с таким email уже существует"

    ValidationError:
      description: Невалидные данные
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: VALIDATION_ERROR
              message: "Поле email обязательно"
              details:
                - "email: обязательное поле"

    InternalError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: INTERNAL_ERROR
              message: "Внутренняя ошибка сервера"

paths:
  # ==================== AUTH ====================
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь создан, возвращается пара токенов
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TokenPair'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TokenPair'
        '401':
          description: Неверный email или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: UNAUTHORIZED
                  message: "Неверный email или пароль"
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Обновление access-токена
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Новая пара токенов
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TokenPair'
        '401':
          description: Невалидный или истёкший refresh-токен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: UNAUTHORIZED
                  message: "Невалидный refresh-токен"
        '500':
          $ref: '#/components/responses/InternalError'

  # ==================== USERS ====================
  /users/{id}:
    get:
      tags: [Users]
      summary: Профиль пользователя
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Профиль пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserProfile'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/me:
    patch:
      tags: [Users]
      summary: Редактирование своего профиля
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Обновлённый профиль
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{id}/recipes:
    get:
      tags: [Users]
      summary: Рецепты пользователя
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Список рецептов пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecipeListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{id}/posts:
    get:
      tags: [Users]
      summary: Посты пользователя
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Список постов пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PostListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ==================== RECIPES ====================
  /recipes:
    post:
      tags: [Recipes]
      summary: Создать рецепт
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipeRequest'
      responses:
        '201':
          description: Рецепт создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/RecipeFull'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags: [Recipes]
      summary: Список рецептов с фильтрацией
      parameters:
        - name: dish_type_id
          in: query
          description: Фильтр по типу блюда
          schema:
            type: integer
            format: int64
        - name: difficulty_id
          in: query
          description: Фильтр по уровню сложности
          schema:
            type: integer
            format: int64
        - name: ingredient_ids
          in: query
          description: Фильтр по ингредиентам (через запятую)
          schema:
            type: string
          example: "1,5,12"
        - name: tag_ids
          in: query
          description: Фильтр по тегам (через запятую)
          schema:
            type: string
          example: "2,7"
        - name: search
          in: query
          description: Поиск по названию рецепта
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Список рецептов
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecipeListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /recipes/{id}:
    get:
      tags: [Recipes]
      summary: Полный рецепт
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
